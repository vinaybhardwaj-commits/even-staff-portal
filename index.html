<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Even Staff Portal — moved</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://evenstaffportal.vercel.app/">
  <link rel="canonical" href="https://evenstaffportal.vercel.app/">
  <style>
    :root {
      --brand: #0055ff;
      --navy: #002054;
      --bg: #f2f4f8;
      --muted: #7a8599;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--navy);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      max-width: 460px;
      padding: 40px 32px;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: var(--brand);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p  { color: var(--muted); font-size: 13px; line-height: 1.6; margin: 0 0 20px; }
    a.btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--brand);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    a.btn:hover { background: #0044cc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">E</div>
    <h1>Staff Portal has moved</h1>
    <p>Redirecting you to <strong>evenstaffportal.vercel.app</strong>… update your bookmark when you land there.</p>
    <a class="btn" href="https://evenstaffportal.vercel.app/">Open Staff Portal →</a>
  </div>
  <script>
    // Hard redirect in case meta-refresh is blocked
    setTimeout(function () { window.location.replace('https://evenstaffportal.vercel.app/'); }, 100);
  </script>
</body>
</html>
